$kind: http-example
id: f4752852-8f7d-4f3e-bb65-ea45792a25f1
name: Project found.
request:
  url: "{{baseUrl}}/v1/projects/:projectId"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    - key: projectId
      value: proj-1001
      description: Project identifier.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "proj-1001",
        "key": "PAYMOD",
        "name": "Payments Modernization",
        "templateId": "template-scrum",
        "ownerEmail": "maya.chen@example.com",
        "status": "ready",
        "createdAt": "2026-07-20T14:20:00.000Z",
        "projectUrl": "https://example.atlassian.net/jira/software/projects/PAYMOD"
      }
order: 1000
