$kind: http-example
id: 3e7734b9-a07d-4441-a346-e9791d1ae3a8
name: Request references an unknown template.
request:
  url: "{{baseUrl}}/v1/projects"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "name": "Partner Portal",
        "key": "PORTAL",
        "templateId": "template-kanban",
        "ownerEmail": "alex.morgan@example.com"
      }
response:
  statusCode: 422
  statusText: Unprocessable Entity (WebDAV) (RFC 4918)
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "project_not_found",
        "message": "Project proj-404 was not found.",
        "traceId": "trc-8f7340b5af23"
      }
order: 3000
