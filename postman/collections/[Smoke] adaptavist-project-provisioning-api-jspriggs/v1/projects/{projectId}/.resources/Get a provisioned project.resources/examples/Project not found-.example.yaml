$kind: http-example
id: 147b8de4-7a21-49ba-85e4-ee2245c16dcc
name: Project not found.
request:
  url: "{{baseUrl}}/v1/projects/:projectId"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    - key: projectId
      value: proj-1001
      description: Project identifier.
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "project_not_found",
        "message": "Project proj-404 was not found.",
        "traceId": "trc-8f7340b5af23"
      }
order: 2000
