openapi: 3.0.3
info:
  title: Adaptavist Project Provisioning API
  version: 1.0.0
  description: API for selecting a Jira project template, provisioning a project, and checking the project status.
servers:
  - url: http://127.0.0.1:4010
    description: Local CI service
tags:
  - name: Health
    description: Service readiness checks.
  - name: Project Templates
    description: Jira project templates available for provisioning.
  - name: Projects
    description: Jira project provisioning and lookup.
paths:
  /v1/health:
    get:
      tags:
        - Health
      operationId: getHealth
      summary: Check service health
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                healthy:
                  value:
                    status: ok
                    service: adaptavist-project-provisioning-api
                    version: 1.0.0
                    timestamp: '2026-07-20T14:20:00.000Z'
  /v1/project-templates:
    get:
      tags:
        - Project Templates
      operationId: listProjectTemplates
      summary: List project templates
      responses:
        '200':
          description: Project templates available for new Jira projects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectTemplateList'
              examples:
                templates:
                  value:
                    items:
                      - id: template-scrum
                        name: Scrum Software Project
                        description: Backlog, sprints, boards, and release tracking.
                        defaultIssueType: Story
                      - id: template-kanban
                        name: Kanban Software Project
                        description: Continuous-flow board for operational and platform work.
                        defaultIssueType: Task
                      - id: template-service-desk
                        name: Service Desk Project
                        description: Request intake, queues, and service-level tracking.
                        defaultIssueType: Request
                    count: 3
  /v1/projects:
    post:
      tags:
        - Projects
      operationId: createProject
      summary: Provision a Jira project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProject'
            examples:
              partnerPortal:
                value:
                  name: Partner Portal
                  key: PORTAL
                  templateId: template-kanban
                  ownerEmail: alex.morgan@example.com
      responses:
        '201':
          description: Project provisioning started.
          headers:
            Location:
              description: Relative URL of the provisioned project.
              schema:
                type: string
              example: /v1/projects/proj-2000
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
              examples:
                provisioning:
                  value:
                    id: proj-2000
                    key: PORTAL
                    name: Partner Portal
                    templateId: template-kanban
                    ownerEmail: alex.morgan@example.com
                    status: provisioning
                    createdAt: '2026-07-20T16:00:00.000Z'
                    projectUrl: https://example.atlassian.net/jira/software/projects/PORTAL
        '400':
          description: Request body failed validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: Request references an unknown template.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
  /v1/projects/{projectId}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags:
        - Projects
      operationId: getProject
      summary: Get a provisioned project
      responses:
        '200':
          description: Project found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
              examples:
                ready:
                  value:
                    id: proj-1001
                    key: PAYMOD
                    name: Payments Modernization
                    templateId: template-scrum
                    ownerEmail: maya.chen@example.com
                    status: ready
                    createdAt: '2026-07-20T14:20:00.000Z'
                    projectUrl: https://example.atlassian.net/jira/software/projects/PAYMOD
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
components:
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      description: Project identifier.
      schema:
        type: string
        pattern: '^proj-[0-9]+$'
      example: proj-1001
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - service
        - version
        - timestamp
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
          example: adaptavist-project-provisioning-api
        version:
          type: string
          example: 1.0.0
        timestamp:
          type: string
          format: date-time
    ProjectTemplateList:
      type: object
      additionalProperties: false
      required:
        - items
        - count
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProjectTemplate'
        count:
          type: integer
          minimum: 0
    ProjectTemplate:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - description
        - defaultIssueType
      properties:
        id:
          type: string
          enum:
            - template-scrum
            - template-kanban
            - template-service-desk
          example: template-scrum
        name:
          type: string
          example: Scrum Software Project
        description:
          type: string
          example: Backlog, sprints, boards, and release tracking.
        defaultIssueType:
          type: string
          example: Story
    CreateProject:
      type: object
      additionalProperties: false
      required:
        - name
        - key
        - templateId
        - ownerEmail
      properties:
        name:
          type: string
          minLength: 3
          example: Partner Portal
        key:
          type: string
          minLength: 2
          maxLength: 10
          pattern: '^[A-Z][A-Z0-9]{1,9}$'
          example: PORTAL
        templateId:
          type: string
          enum:
            - template-scrum
            - template-kanban
            - template-service-desk
          example: template-kanban
        ownerEmail:
          type: string
          format: email
          example: alex.morgan@example.com
    Project:
      type: object
      additionalProperties: false
      required:
        - id
        - key
        - name
        - templateId
        - ownerEmail
        - status
        - createdAt
        - projectUrl
      properties:
        id:
          type: string
          pattern: '^proj-[0-9]+$'
          example: proj-1001
        key:
          type: string
          pattern: '^[A-Z][A-Z0-9]{1,9}$'
          example: PAYMOD
        name:
          type: string
          example: Payments Modernization
        templateId:
          type: string
          enum:
            - template-scrum
            - template-kanban
            - template-service-desk
          example: template-scrum
        ownerEmail:
          type: string
          format: email
          example: maya.chen@example.com
        status:
          $ref: '#/components/schemas/ProjectStatus'
        createdAt:
          type: string
          format: date-time
        projectUrl:
          type: string
          format: uri
          example: https://example.atlassian.net/jira/software/projects/PAYMOD
    ProjectStatus:
      type: string
      enum:
        - provisioning
        - ready
        - failed
    Problem:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - traceId
      properties:
        code:
          type: string
          example: project_not_found
        message:
          type: string
          example: Project proj-404 was not found.
        traceId:
          type: string
          example: trc-8f7340b5af23
